name: Mobile Automation Tests

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1-5'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download APK
      run: |
        mkdir -p apps
        curl -L -o apps/wdio-demo.apk https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk

    - name: Enable KVM for emulator
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create AVD
      run: |
        echo "y" | sdkmanager "system-images;android-34;google_apis;x86_64"
        echo "no" | avdmanager create avd -n TestDevice -k "system-images;android-34;google_apis;x86_64" --force

    - name: Start emulator
      run: |
        $ANDROID_HOME/emulator/emulator -avd TestDevice -no-window -no-audio -no-boot-anim &
        adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Appium
      run: |
        npm install -g appium@2.11.0
        appium driver install uiautomator2@2.29.2
        appium --base-path /wd/hub &
        sleep 5

    - name: Run tests
      run: mvn clean test

    - name: Generate Allure Report
      if: always()
      run: |
        npm install -g allure-commandline
        allure generate allure-results --clean -o allure-report

    - name: Deploy to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-report